<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЦифроМлк - Исходные данные</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>ЦифроМлк</h1>
            <p>Ввод исходных данных молока</p>
        </header>
        <main>
            <form id="milk-form" class="card">
                <div class="form-group">
                    <label for="volume">Объём цельного молока (л) *</label>
                    <input type="number" id="volume" step="0.1" min="0" required placeholder="Например: 100">
                    <span class="error-msg"></span>
                </div>
                <div class="form-group">
                    <label for="fat">Жирность молока (%) *</label>
                    <input type="number" id="fat" step="0.1" min="0" max="100" required placeholder="Например: 4.0">
                    <span class="error-msg"></span>
                </div>
                <div class="form-group">
                    <label for="density">Плотность молока (кг/л)</label>
                    <input type="number" id="density" step="0.001" min="0" value="1.030">
                    <span class="error-msg"></span>
                </div>
                <div class="form-group">
                    <label for="protein">Содержание белка (%)</label>
                    <input type="number" id="protein" step="0.1" min="0" placeholder="Необязательно">
                    <span class="error-msg"></span>
                </div>
                <button type="submit" class="btn btn-primary">Сохранить</button>
            </form>
        </main>
    </div>
    <div id="toast-container"></div>
    <script src="script.js"></script>
</body>
</html>
